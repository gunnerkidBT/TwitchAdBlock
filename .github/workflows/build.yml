name: CI

# Every push builds the rootless/rootful debs as a smoke test (no IPA — a CI
# runner cannot legally obtain a decrypted Twitch IPA on its own).
#
# IPA builds run only via manual workflow_dispatch with create_release=true,
# and require an `ipa_url` pointing at a DECRYPTED Twitch IPA you host yourself
# (temp file host, private cloud link, private release asset, etc.). The job
# then builds the dylib with Theos and runs inject_ipa.py to produce BOTH a
# full IPA and a --no-plugins IPA (all app extensions stripped — fits free
# Apple ID accounts limited to 10 App IDs / 7 days), then drafts a release.
on:
  push:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Build IPAs and create a draft release"
        default: false
        type: boolean
      ipa_url:
        description: "Direct URL to a DECRYPTED Twitch IPA (required when create_release=true)"
        type: string
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get package info
        id: package_info
        run: |
          version=$(grep "PACKAGE_VERSION =" Makefile | head -1 | cut -d' ' -f3)
          echo "id=$(grep "Package:" control | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup theos
        uses: level3tjg/theos-action@main
        with:
          cache: true
          cache-dir-theos: ${{ github.workspace }}/theos
          cache-dir-sdks: ${{ github.workspace }}/theos/sdks

      # ---------------------------------------------------------------- debs
      # Smoke test on every run; final (stripped) packages when releasing.
      - name: Build rootless deb
        run: make package
        env:
          FINALPACKAGE: ${{ inputs.create_release }}
          THEOS_PACKAGE_SCHEME: rootless

      - name: Build rootful deb
        run: make clean package
        env:
          FINALPACKAGE: ${{ inputs.create_release }}

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_info.outputs.id }}_${{ steps.package_info.outputs.version }}_debs
          path: packages/*

      # ----------------------------------------------------------------- IPA
      - name: Validate inputs
        if: ${{ inputs.create_release }}
        run: |
          if [ -z "${{ inputs.ipa_url }}" ]; then
            echo "::error::create_release=true requires an ipa_url (direct link to a DECRYPTED Twitch IPA)."
            exit 1
          fi

      - name: Download decrypted IPA
        if: ${{ inputs.create_release }}
        run: |
          curl -fSL -o "${{ github.workspace }}/App.ipa" "${{ inputs.ipa_url }}"
          unzip -tq "${{ github.workspace }}/App.ipa" >/dev/null
          echo "Downloaded $(du -h "${{ github.workspace }}/App.ipa" | cut -f1) IPA"

      - name: Build dylib
        if: ${{ inputs.create_release }}
        run: make clean && make -j"$(nproc)"
        env:
          FINALPACKAGE: 1

      - name: Locate dylib
        if: ${{ inputs.create_release }}
        id: dylib
        run: |
          path=$(find .theos -name 'TwitchAdBlock.dylib' ! -path '*.dSYM*' | head -1)
          if [ -z "$path" ]; then
            echo "::error::TwitchAdBlock.dylib not found after build."
            exit 1
          fi
          echo "Built: $path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Read Twitch app version
        if: ${{ inputs.create_release }}
        id: ipa_info
        run: |
          ver=$(python3 - "${{ github.workspace }}/App.ipa" <<'PY'
          import sys, zipfile, plistlib, io
          z = zipfile.ZipFile(sys.argv[1])
          name = next(n for n in z.namelist()
                      if n.startswith("Payload/") and n.endswith(".app/Info.plist"))
          d = plistlib.load(io.BytesIO(z.read(name)))
          print(d["CFBundleShortVersionString"])
          PY
          )
          echo "Twitch version: $ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Inject dylib (full + no-plugins)
        if: ${{ inputs.create_release }}
        run: |
          mkdir -p out
          base="tv.twitch-${{ steps.ipa_info.outputs.version }}-TwitchAdBlock-${{ steps.package_info.outputs.version }}"
          python3 inject_ipa.py "${{ github.workspace }}/App.ipa" "${{ steps.dylib.outputs.path }}" "out/${base}.ipa"
          python3 inject_ipa.py "${{ github.workspace }}/App.ipa" "${{ steps.dylib.outputs.path }}" "out/${base}-noplugins.ipa" --no-plugins
          ls -lh out

      - name: Create draft release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: v${{ steps.ipa_info.outputs.version }}-${{ steps.package_info.outputs.version }}
          name: v${{ steps.ipa_info.outputs.version }} — TwitchAdBlock ${{ steps.package_info.outputs.version }}
          files: out/*.ipa
