name: CI

# Every push builds the rootless/rootful debs as a smoke test (no IPA — a CI
# runner cannot legally obtain a decrypted Twitch IPA on its own).
#
# IPA builds run only via manual workflow_dispatch with create_release=true,
# and require an `ipa_url` pointing at a DECRYPTED Twitch IPA you host yourself
# (temp file host, private cloud link, private release asset, etc.). The job
# then builds the dylib with Theos and runs inject_ipa.py to produce BOTH a
# full IPA and a --no-plugins IPA (all app extensions stripped — fits free
# Apple ID accounts limited to 10 App IDs / 7 days), then drafts a release.
#
# The decrypted IPA is pulled from the `decrypted-source` DRAFT release (an
# asset there, not publicly visible) via the built-in GITHUB_TOKEN — no
# third-party host. To update for a new Twitch version, replace that asset.
# `ipa_url` is an optional override for testing a one-off direct link.
on:
  push:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Build IPAs and create a draft release"
        default: false
        type: boolean
      source_tag:
        description: "Draft release tag holding the decrypted IPA asset"
        default: "decrypted-source"
        type: string
      ipa_url:
        description: "Optional: direct URL to a decrypted IPA (overrides source_tag)"
        type: string
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get package info
        id: package_info
        run: |
          version=$(grep "PACKAGE_VERSION =" Makefile | head -1 | cut -d' ' -f3 | tr -d '\r')
          id=$(grep "Package:" control | cut -d' ' -f2 | tr -d '\r')
          echo "id=$id" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup theos
        uses: level3tjg/theos-action@main
        with:
          cache: true
          cache-dir-theos: ${{ github.workspace }}/theos
          cache-dir-sdks: ${{ github.workspace }}/theos/sdks

      # ---------------------------------------------------------------- debs
      # Smoke test on every run; final (stripped) packages when releasing.
      - name: Build rootless deb
        run: make package
        env:
          FINALPACKAGE: ${{ inputs.create_release }}
          THEOS_PACKAGE_SCHEME: rootless

      - name: Build rootful deb
        run: make clean package
        env:
          FINALPACKAGE: ${{ inputs.create_release }}

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_info.outputs.id }}_${{ steps.package_info.outputs.version }}_debs
          path: packages/*

      # ----------------------------------------------------------------- IPA
      - name: Fetch decrypted IPA
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ipa="${{ github.workspace }}/App.ipa"
          if [ -n "${{ inputs.ipa_url }}" ]; then
            echo "Using ipa_url override"
            curl -fSL -o "$ipa" "${{ inputs.ipa_url }}"
          else
            tag="${{ inputs.source_tag }}"
            echo "Downloading decrypted IPA from draft release '$tag'"
            rm -rf _src && mkdir -p _src
            gh release download "$tag" --repo "$GITHUB_REPOSITORY" --pattern '*.ipa' --dir _src
            src=$(find _src -name '*.ipa' | head -1)
            if [ -z "$src" ]; then
              echo "::error::No .ipa asset found on release '$tag'. Upload your decrypted Twitch IPA there (gh release upload $tag App.ipa)."
              exit 1
            fi
            mv "$src" "$ipa"
          fi
          size=$(stat -c%s "$ipa")
          echo "Downloaded $(numfmt --to=iec "$size") ($size bytes)"
          # A real IPA is a zip — first two bytes must be the "PK" magic. A
          # share/landing page (or an HTML error) returns tiny content instead,
          # so fail loudly rather than dying on a cryptic unzip error later.
          magic=$(head -c2 "$ipa")
          if [ "$magic" != "PK" ] || [ "$size" -lt 1000000 ]; then
            echo "::error::Not a valid IPA (got $size bytes, magic '$magic'). If using ipa_url, it must be a DIRECT download (raw bytes), not a share/landing page. If using the source release, check the '*.ipa' asset on tag '${{ inputs.source_tag }}'."
            head -c512 "$ipa" || true
            exit 1
          fi
          unzip -tq "$ipa" >/dev/null

      - name: Build dylib
        if: ${{ inputs.create_release }}
        run: make clean && make -j"$(nproc)"
        env:
          FINALPACKAGE: 1

      - name: Locate dylib
        if: ${{ inputs.create_release }}
        id: dylib
        run: |
          path=$(find .theos -name 'TwitchAdBlock.dylib' ! -path '*.dSYM*' | head -1)
          if [ -z "$path" ]; then
            echo "::error::TwitchAdBlock.dylib not found after build."
            exit 1
          fi
          echo "Built: $path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Read Twitch app version
        if: ${{ inputs.create_release }}
        id: ipa_info
        run: |
          ver=$(python3 - "${{ github.workspace }}/App.ipa" <<'PY'
          import sys, zipfile, plistlib, io
          z = zipfile.ZipFile(sys.argv[1])
          name = next(n for n in z.namelist()
                      if n.startswith("Payload/") and n.endswith(".app/Info.plist"))
          d = plistlib.load(io.BytesIO(z.read(name)))
          print(d["CFBundleShortVersionString"])
          PY
          )
          echo "Twitch version: $ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Inject dylib (full + no-plugins)
        if: ${{ inputs.create_release }}
        run: |
          mkdir -p out
          base="tv.twitch-${{ steps.ipa_info.outputs.version }}-TwitchAdBlock-${{ steps.package_info.outputs.version }}"
          python3 inject_ipa.py "${{ github.workspace }}/App.ipa" "${{ steps.dylib.outputs.path }}" "out/${base}.ipa"
          python3 inject_ipa.py "${{ github.workspace }}/App.ipa" "${{ steps.dylib.outputs.path }}" "out/${base}-noplugins.ipa" --no-plugins
          ls -lh out

      # Publish to a distinct `-ci` draft tag so re-runs never mutate a
      # hand-published release (softprops updates the release matching the
      # tag). Review the draft, then publish/rename to the real tag yourself.
      - name: Create draft release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: v${{ steps.ipa_info.outputs.version }}-${{ steps.package_info.outputs.version }}-ci
          name: "CI draft: v${{ steps.ipa_info.outputs.version }} — TwitchAdBlock ${{ steps.package_info.outputs.version }}"
          body: "Automated CI build (full + no-plugins IPAs). Verify, then publish under the real `v${{ steps.ipa_info.outputs.version }}-${{ steps.package_info.outputs.version }}` tag."
          files: out/*.ipa
